services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend-data:
  backend-uploads:

